name: Core tests

on:
  push:
    branches:
      - master
    paths-ignore:
      - "*.md"
  pull_request:
    types: [opened, synchronize, reopened, edited]
    paths-ignore:
      - "*.md"
  workflow_dispatch:

env:
  MODULE_NAME: "calamancy"
  RUN_LINTER: "false"

jobs:
  run:
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python_version: ["3.11"]
        include:
          - os: ubuntu-latest
            python_version: "3.9"
          - os: windows-latest
            python_version: "3.10"
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python_version }}
          enable-cache: true

      - name: Install dependencies
        run: uv sync --dev

      - name: Run linter checks
        shell: bash
        if: ${{ env.RUN_LINTER == 'true' }}
        run: |
          uv run ruff check .
          uv run mypy $MODULE_NAME

      - name: Test import
        shell: bash
        run: |
          uv run python -Werror -c "import $MODULE_NAME"

      - name: "Run tests"
        shell: bash
        run: |
          uv run pytest --pyargs $MODULE_NAME
